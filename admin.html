<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わかば 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#5C8A5C;--gd:#3A4A2E;--gl:#eef5ec;--gb:#d8e8d4;
  --text:#2D2D2D;--muted:#8A8070;--bg:#FAF8F4;--white:#fff;
  --red:#c0392b;--rl:#fff0ee;--rb:#f5c6c2;
}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,#F0EBE1,#E8E2D5,#EDE8DE);}
.login-box{background:var(--white);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.08);}
.login-box img{width:180px;display:block;margin:0 auto 6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;letter-spacing:.05em;}
.login-box input{width:100%;border:2px solid #eee;border-radius:12px;padding:13px 16px;font-family:inherit;font-size:15px;text-align:center;letter-spacing:.2em;outline:none;margin-bottom:14px;transition:border-color .2s;}
.login-box input:focus{border-color:var(--g);}
.btn-login{width:100%;background:linear-gradient(135deg,#5C8A5C,#7AAE7A);color:var(--white);border:none;border-radius:14px;padding:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(92,138,92,0.3);}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(92,138,92,0.4);}
.login-err{color:#E07070;font-size:13px;margin-top:10px;display:none;}

/* MAIN */
#mainScreen{display:none;}
header{background:var(--white);border-bottom:1px solid var(--gb);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
header img{height:36px;}
.logout-btn{background:transparent;border:1px solid var(--gb);border-radius:6px;padding:6px 14px;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--gb);background:var(--white);overflow-x:auto;}
.tab{flex:1;min-width:70px;padding:12px 6px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s;}
.tab.active{color:var(--g);border-bottom-color:var(--g);}
.tab-content{display:none;padding:16px;max-width:640px;margin:0 auto;}
.tab-content.active{display:block;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--gb);border-radius:12px;padding:16px;margin-bottom:16px;}
.sec-title{font-size:13px;color:var(--g);letter-spacing:.08em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gb);}

/* TODAY BANNER */
#todayBanner{background:linear-gradient(135deg,#eef5ec,#d8ead3);border:1px solid var(--gb);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:none;}
#todayBanner h3{font-size:12px;color:var(--g);margin-bottom:8px;}
.today-item{background:var(--white);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:10px;}
.today-time{font-weight:700;color:var(--g);min-width:50px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--white);border:1px solid var(--gb);border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:300;color:var(--g);line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
.menu-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f0f4ef;font-size:13px;}
.menu-row:last-child{border-bottom:none;}
.menu-bar-wrap{flex:1;margin:0 10px;height:6px;background:#eee;border-radius:3px;}
.menu-bar{height:100%;background:var(--g);border-radius:3px;transition:width .5s;}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border:1px solid var(--gb);border-radius:20px;font-family:inherit;font-size:12px;color:var(--muted);background:var(--white);cursor:pointer;transition:all .2s;}
.filter-btn.active{background:var(--g);color:var(--white);border-color:var(--g);}

/* RESERVATION ITEMS */
.res-item{background:var(--white);border:1px solid var(--gb);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.res-item.today-hl{border-color:var(--g);border-width:1.5px;}
.res-date{font-size:13px;font-weight:700;color:var(--g);margin-bottom:4px;}
.res-detail{font-size:13px;line-height:1.8;}
.res-memo{width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-family:inherit;font-size:12px;resize:none;outline:none;background:#fafafa;margin-top:8px;}
.res-memo:focus{border-color:var(--g);background:var(--white);}
.res-actions{display:flex;gap:8px;margin-top:6px;}
.btn-memo{padding:5px 12px;background:var(--gl);border:1px solid var(--gb);border-radius:6px;font-family:inherit;font-size:11px;color:var(--g);cursor:pointer;}
.btn-del{padding:5px 12px;background:var(--rl);border:1px solid var(--rb);border-radius:6px;font-family:inherit;font-size:11px;color:var(--red);cursor:pointer;margin-left:auto;}
.no-res{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav button{background:none;border:1px solid var(--gb);border-radius:6px;padding:5px 12px;font-family:inherit;font-size:14px;color:var(--g);cursor:pointer;}
.cal-title{font-size:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hd{text-align:center;font-size:11px;color:var(--muted);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:13px;cursor:pointer;transition:background .15s;}
.cal-day:hover{background:var(--gl);}
.cal-day.today{background:var(--g);color:var(--white);border-radius:50%;}
.cal-day.off{color:#ccc;background:#f5f5f5;cursor:default;}
.cal-day.off:hover{background:#f5f5f5;}
.cal-day.selected{background:var(--selected,#a8d5b8);border-radius:50%;}

/* WEEK BTNS */
.week-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.week-btn{width:42px;height:42px;border:1px solid var(--gb);border-radius:50%;font-family:inherit;font-size:14px;color:var(--muted);background:var(--white);cursor:pointer;transition:all .15s;}
.week-btn.active{background:var(--g);color:var(--white);border-color:var(--g);}
.holiday-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff8f0;border:1px solid #f0dfc0;border-radius:8px;margin-bottom:8px;font-size:13px;}
.holiday-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;}

/* HOURS TABLE */
.hours-table{width:100%;border-collapse:collapse;font-size:13px;}
.hours-table th,.hours-table td{padding:9px 8px;border-bottom:1px solid #f0f4ef;text-align:center;}
.hours-table th{color:var(--muted);font-weight:400;}
.hours-table input[type="time"]{border:1px solid var(--gb);border-radius:6px;padding:4px 8px;font-family:inherit;font-size:13px;width:88px;text-align:center;}

/* BLOCK */
.block-slot-btn{padding:8px 14px;border:1px solid var(--gb);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white);cursor:pointer;transition:all .2s;margin:4px;}
.block-slot-btn.blocked{background:var(--rl);border-color:var(--rb);color:var(--red);}
.blocked-tag{display:inline-flex;align-items:center;gap:6px;background:var(--rl);border:1px solid var(--rb);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--red);margin:3px;}
.blocked-tag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;}
.no-block{font-size:13px;color:var(--muted);padding:8px 0;}

/* REMINDER */
.reminder-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f4ef;font-size:13px;}
.reminder-item:last-child{border-bottom:none;}
.reminder-name{font-weight:400;color:var(--text);}
.reminder-time{color:var(--muted);font-size:12px;margin-top:2px;}
.btn-send{padding:7px 14px;background:var(--g);color:var(--white);border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;}
.btn-send:disabled{background:#aaa;cursor:default;}

/* SAVE BTN */
.save-btn{width:100%;background:var(--g);color:var(--white);border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.save-btn:disabled{background:#aaa;cursor:default;}

/* MODAL */
#deleteModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#deleteModal.open{display:flex;}
.modal-box{background:var(--white);border-radius:16px;padding:28px 24px;width:100%;max-width:360px;text-align:center;}
.modal-box h3{font-size:16px;font-weight:400;margin-bottom:8px;}
.modal-box p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;}
.modal-btns{display:flex;gap:12px;}
.btn-mc{flex:1;padding:12px;background:var(--white);border:1px solid var(--gb);border-radius:8px;font-family:inherit;font-size:14px;color:var(--muted);cursor:pointer;}
.btn-md{flex:1;padding:12px;background:var(--red);border:none;border-radius:8px;font-family:inherit;font-size:14px;color:var(--white);cursor:pointer;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(40,80,50,0.92);color:var(--white);padding:12px 24px;border-radius:24px;font-size:14px;transition:transform .3s;z-index:9999;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

/* ===== FIREBASE ===== */
function loadScript(src,cb){
  if(document.querySelector('script[src="'+src+'"]')){cb();return;}
  var s=document.createElement('script');
  s.src=src;s.onload=cb;document.head.appendChild(s);
}
function initFirebase(cb){
  if(window._db){cb(window._db);return;}
  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',function(){

        });

}

/* ===== RESERVATIONS ===== */
function loadReservations(db){
  db.collection('reservations').get().then(function(snap){
    allReservations=[];
    snap.forEach(function(d){allReservations.push(Object.assign({id:d.id},d.data()));});
    allReservations.sort(function(a,b){
      if(a.date!==b.date)return a.date.localeCompare(b.date);
      return a.time.localeCompare(b.time);
    });
    renderReservations();renderTodayBanner();renderStats();renderReminderList();
  }).catch(function(){
    document.getElementById('reservationList').innerHTML='<div class="no-res">読み込みに失敗しました</div>';
  });
}

function getFiltered(filter){
  var future=allReservations.filter(function(r){return r.date>=todayStr;});
  if(filter==='today')return future.filter(function(r){return r.date===todayStr;});
  if(filter==='week'){
    var d=new Date(today),day=d.getDay();
    var mon=new Date(d);mon.setDate(d.getDate()-day+(day===0?-6:1));
    var sun=new Date(mon);sun.setDate(mon.getDate()+6);
    var ms=fmt(mon),ss=fmt(sun);
    return future.filter(function(r){return r.date>=ms&&r.date<=ss;});
  }
  if(filter==='month'){
    var pre=today.getFullYear()+'-'+pad(today.getMonth()+1);
    return future.filter(function(r){return r.date.startsWith(pre);});
  }
  return future;
}

function filterRes(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderReservations();
}

function renderReservations(){
  var list=document.getElementById('reservationList');
  var items=getFiltered(currentFilter);
  if(!items.length){list.innerHTML='<div class="no-res">該当する予約はありません</div>';return;}
  var dow=['日','月','火','水','木','金','土'];
  list.innerHTML=items.map(function(r){
    var d=new Date(r.date);
    var isToday=r.date===todayStr;
    var memo=r.memo||'';
    return '<div class="res-item'+(isToday?' today-hl':'')+'" id="res-'+r.id+'">'+
      '<div class="res-date">'+(isToday?'🟢 ':'')+(d.getMonth()+1)+'/'+d.getDate()+'('+dow[d.getDay()]+') '+r.time+'〜</div>'+
      '<div class="res-detail">'+r.name+' 様 ／ '+r.menuName+' ／ '+r.tel+(r.email?'<br>'+r.email:'')+'</div>'+
      '<textarea class="res-memo" id="memo-'+r.id+'" rows="1" placeholder="メモを追加...">'+memo+'</textarea>'+
      '<div class="res-actions">'+
        '<button class="btn-memo" onclick="saveMemo(\''+r.id+'\')">メモ保存</button>'+
        '<button class="btn-del" onclick="openDeleteModal(\''+r.id+'\',\''+r.name+'\',\''+(d.getMonth()+1)+'/'+d.getDate()+' '+r.time+'\')">削除</button>'+
      '</div></div>';
  }).join('');
}

function renderTodayBanner(){
  var banner=document.getElementById('todayBanner');
  var list=document.getElementById('todayList');
  var items=allReservations.filter(function(r){return r.date===todayStr;});
  if(!items.length){banner.style.display='none';return;}
  banner.style.display='block';
  var dow=['日','月','火','水','木','金','土'];
  list.innerHTML=items.map(function(r){
    return '<div class="today-item"><span class="today-time">'+r.time+'</span><span>'+r.name+' 様 '+r.menuName+'</span></div>';
  }).join('');
}

function renderStats(){
  var pre=today.getFullYear()+'-'+pad(today.getMonth()+1);
  var d=new Date(today),day=d.getDay();
  var mon=new Date(d);mon.setDate(d.getDate()-day+(day===0?-6:1));
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var ms=fmt(mon),ss=fmt(sun);
  document.getElementById('statTotal').textContent=allReservations.length;
  document.getElementById('statMonth').textContent=allReservations.filter(function(r){return r.date.startsWith(pre);}).length;
  document.getElementById('statWeek').textContent=allReservations.filter(function(r){return r.date>=ms&&r.date<=ss;}).length;
  document.getElementById('statToday').textContent=allReservations.filter(function(r){return r.date===todayStr;}).length;
  var monthItems=allReservations.filter(function(r){return r.date.startsWith(pre);});
  var mc={};
  monthItems.forEach(function(r){mc[r.menuName]=(mc[r.menuName]||0)+1;});
  var max=Math.max.apply(null,Object.values(mc).concat([1]));
  var el=document.getElementById('menuStats');
  var keys=Object.keys(mc).sort(function(a,b){return mc[b]-mc[a];});
  if(!keys.length){el.innerHTML='<div style="font-size:13px;color:var(--muted);padding:12px 0;">今月の予約はありません</div>';return;}
  el.innerHTML=keys.map(function(name){
    return '<div class="menu-row"><span>'+name+'</span><div class="menu-bar-wrap"><div class="menu-bar" style="width:'+Math.round(mc[name]/max*100)+'%"></div></div><span style="min-width:24px;text-align:right;color:var(--g)">'+mc[name]+'</span></div>';
  }).join('');
}

/* ===== MEMO & DELETE ===== */
function saveMemo(id){
  var memo=document.getElementById('memo-'+id).value;
  initFirebase(function(db){
    db.collection('reservations').doc(id).update({memo:memo}).then(function(){
      var t=allReservations.find(function(r){return r.id===id;});
      if(t)t.memo=memo;
      showToast('メモを保存しました');
    }).catch(function(){showToast('保存に失敗しました');});
  });
}
function openDeleteModal(id,name,dt){
  deleteTargetId=id;
  document.getElementById('deleteModalInfo').textContent=dt+' '+name+' 様の予約を削除します。この操作は元に戻せません。';
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal(){document.getElementById('deleteModal').classList.remove('open');deleteTargetId=null;}
function confirmDelete(){
  if(!deleteTargetId)return;
  initFirebase(function(db){
    db.collection('reservations').doc(deleteTargetId).delete().then(function(){
      allReservations=allReservations.filter(function(r){return r.id!==deleteTargetId;});
      closeDeleteModal();renderReservations();renderTodayBanner();renderStats();renderReminderList();
      showToast('予約を削除しました');
    }).catch(function(){showToast('削除に失敗しました');closeDeleteModal();});
  });
}

/* ===== CALENDAR (休業日) ===== */
function renderWeekBtns(){
  var days=['日','月','火','水','木','金','土'];
  document.getElementById('weekBtns').innerHTML=days.map(function(d,i){
    return '<button class="week-btn'+(weeklyOff.indexOf(i)>=0?' active':'')+'" onclick="toggleWeekOff('+i+',this)">'+d+'</button>';
  }).join('');
}
function toggleWeekOff(i,btn){
  var idx=weeklyOff.indexOf(i);
  if(idx>=0)weeklyOff.splice(idx,1);else weeklyOff.push(i);
  btn.classList.toggle('active');
}
function renderCalendar(){
  document.getElementById('calTitle').textContent=calYear+'年 '+(calMonth+1)+'月';
  var days=['日','月','火','水','木','金','土'];
  var html=days.map(function(d){return '<div class="cal-hd">'+d+'</div>';}).join('');
  var first=new Date(calYear,calMonth,1).getDay();
  for(var i=0;i<first;i++)html+='<div></div>';
  var last=new Date(calYear,calMonth+1,0).getDate();
  for(var d=1;d<=last;d++){
    var ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d);
    var dow=new Date(calYear,calMonth,d).getDay();
    var isOff=weeklyOff.indexOf(dow)>=0||specificOff.indexOf(ds)>=0;
    var isTd=ds===todayStr;
    var isSel=specificOff.indexOf(ds)>=0;
    html+='<div class="cal-day'+(isTd?' today':'')+(isSel?' selected':'')+(isOff&&!isTd?' off':'')+'" onclick="toggleSpecificOff(\''+ds+'\',this)">'+d+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}
function toggleSpecificOff(ds,el){
  var idx=specificOff.indexOf(ds);
  if(idx>=0){specificOff.splice(idx,1);el.classList.remove('selected');}
  else{specificOff.push(ds);el.classList.add('selected');}
  renderHolidayList();
}
function renderHolidayList(){
  var list=document.getElementById('holidayList');
  var sorted=specificOff.slice().sort();
  if(!sorted.length){list.innerHTML='<div style="font-size:13px;color:var(--muted);padding:8px 0;">特定休業日はありません</div>';return;}
  var dow=['日','月','火','水','木','金','土'];
  list.innerHTML=sorted.map(function(ds){
    var dt=new Date(ds);
    return '<div class="holiday-item"><span>'+(dt.getMonth()+1)+'/'+(dt.getDate())+'('+dow[dt.getDay()]+')</span><button class="holiday-del" onclick="removeSpecificOff(\''+ds+'\')">×</button></div>';
  }).join('');
}
function removeSpecificOff(ds){specificOff=specificOff.filter(function(x){return x!==ds;});renderCalendar();renderHolidayList();}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

/* ===== HOURS ===== */
function renderHoursTable(){
  var days=['日','月','火','水','木','金','土'];
  document.getElementById('hoursTbody').innerHTML=days.map(function(d,i){
    var cfg=hoursConfig[i]||{open:'10:00',close:'18:00'};
    return '<tr><td>'+d+'</td><td><input type="time" id="open-'+i+'" value="'+cfg.open+'" onchange="updateHours('+i+')"></td><td><input type="time" id="close-'+i+'" value="'+cfg.close+'" onchange="updateHours('+i+')"></td></tr>';
  }).join('');
}
function updateHours(i){
  var o=document.getElementById('open-'+i).value;
  var c=document.getElementById('close-'+i).value;
  if(!hoursConfig[i])hoursConfig[i]={};
  hoursConfig[i].open=o;hoursConfig[i].close=c;
}

/* ===== BLOCK ===== */
function renderBlockCalendar(){
  document.getElementById('blockCalTitle').textContent=blockCalYear+'年 '+(blockCalMonth+1)+'月';
  var days=['日','月','火','水','木','金','土'];
  var html=days.map(function(d){return '<div class="cal-hd">'+d+'</div>';}).join('');
  var first=new Date(blockCalYear,blockCalMonth,1).getDay();
  for(var i=0;i<first;i++)html+='<div></div>';
  var last=new Date(blockCalYear,blockCalMonth+1,0).getDate();
  for(var d=1;d<=last;d++){
    var ds=blockCalYear+'-'+pad(blockCalMonth+1)+'-'+pad(d);
    var dow=new Date(blockCalYear,blockCalMonth,d).getDay();
    var isOff=weeklyOff.indexOf(dow)>=0||specificOff.indexOf(ds)>=0;
    var isTd=ds===todayStr;
    var isSel=selectedBlockDate===ds;
    html+='<div class="cal-day'+(isTd?' today':'')+(isSel?' selected':'')+(isOff&&!isTd?' off':'')+'" onclick="selectBlockDate(\''+ds+'\','+dow+')">'+d+'</div>';
  }
  document.getElementById('blockCalGrid').innerHTML=html;
}
function selectBlockDate(ds,dow){
  selectedBlockDate=ds;
  renderBlockCalendar();
  var dowN=['日','月','火','水','木','金','土'];
  var d=new Date(ds);
  document.getElementById('blockDateLabel').textContent=(d.getMonth()+1)+'/'+(d.getDate())+'('+dowN[dow]+')の時間ブロック';
  var cfg=hoursConfig[dow]||hoursConfig[String(dow)]||{};
  var times=genSlots(cfg.open||( dow===0||dow===6?'10:00':'18:30'),cfg.close||(dow===0||dow===6?'18:00':'21:30'));
  document.getElementById('blockSlots').innerHTML=times.map(function(t){
    var key=ds+'_'+t.replace(':','');
    var isB=blockedSlots.indexOf(key)>=0;
    return '<button class="block-slot-btn'+(isB?' blocked':'')+'" data-key="'+key+'" onclick="toggleBlockSlot(this)">'+t+' '+(isB?'🔒 ブロック中':'○ 空き')+'</button>';
  }).join('');
  document.getElementById('blockTimeSection').style.display='block';
}
function genSlots(open,close){
  var slots=[];
  var p=open.split(':');var h=parseInt(p[0]);var m=parseInt(p[1]);
  var q=close.split(':');var eh=parseInt(q[0]);var em=parseInt(q[1]);
  while(h<eh||(h===eh&&m<=em)){slots.push(pad(h)+':'+pad(m));m+=60;if(m>=60){h++;m-=60;}}
  return slots;
}
function toggleBlockSlot(el){
  var key=el.dataset.key;
  var t=key.split('_')[1];
  var ts=t.slice(0,2)+':'+t.slice(2);
  var idx=blockedSlots.indexOf(key);
  if(idx>=0){blockedSlots.splice(idx,1);el.classList.remove('blocked');el.textContent=ts+' ○ 空き';}
  else{blockedSlots.push(key);el.classList.add('blocked');el.textContent=ts+' 🔒 ブロック中';}
  renderBlockedList();
}
function renderBlockedList(){
  var list=document.getElementById('blockedList');
  if(!list)return;
  if(!blockedSlots.length){list.innerHTML='<div class="no-block">ブロック中の時間帯はありません</div>';return;}
  var dow=['日','月','火','水','木','金','土'];
  list.innerHTML=blockedSlots.slice().sort().map(function(key){
    var p=key.split('_');var ds=p[0];var t=p[1];
    var ts=t.slice(0,2)+':'+t.slice(2);
    var d=new Date(ds);
    return '<span class="blocked-tag">'+(d.getMonth()+1)+'/'+(d.getDate())+'('+dow[d.getDay()]+') '+ts+'<button onclick="removeBlock(\''+key+'\')">×</button></span>';
  }).join('');
}
function removeBlock(key){
  blockedSlots=blockedSlots.filter(function(k){return k!==key;});
  renderBlockedList();
  if(selectedBlockDate&&key.startsWith(selectedBlockDate))selectBlockDate(selectedBlockDate,new Date(selectedBlockDate).getDay());
}
function prevBlockMonth(){blockCalMonth--;if(blockCalMonth<0){blockCalMonth=11;blockCalYear--;}renderBlockCalendar();}
function nextBlockMonth(){blockCalMonth++;if(blockCalMonth>11){blockCalMonth=0;blockCalYear++;}renderBlockCalendar();}

/* ===== REMINDER ===== */
function renderReminderList(){
  var el=document.getElementById('reminderList');
  if(!el)return;
  var tom=new Date(today);tom.setDate(today.getDate()+1);
  var ts=fmt(tom);
  var items=allReservations.filter(function(r){return r.date===ts;});
  if(!items.length){el.innerHTML='<div class="no-res">明日の予約はありません</div>';return;}
  var dow=['日','月','火','水','木','金','土'];
  el.innerHTML=items.map(function(r){
    return '<div class="reminder-item">'+
      '<div><div class="reminder-name">'+r.name+' 様</div><div class="reminder-time">'+(tom.getMonth()+1)+'/'+(tom.getDate())+'('+dow[tom.getDay()]+') '+r.time+'〜 '+r.menuName+'</div></div>'+
      '<button class="btn-send" onclick="sendReminder(\''+r.name+'\',\''+(r.email||'')+'\',\''+r.date+'\',\''+r.time+'\',\''+r.menuName+'\')">送信</button>'+
    '</div>';
  }).join('');
}
function sendReminder(name,email,date,time,menu){
  if(!email){showToast('メールアドレスがありません');return;}
  function doSend(){
    var d=new Date(date);
    var dow=['日','月','火','水','木','金','土'];
    emailjs.send(EMAILJS_SERVICE,EMAILJS_TPL,{
      to_name:name,to_email:email,
      date:(d.getMonth()+1)+'/'+(d.getDate())+'('+dow[d.getDay()]+')',
      time:time,menu_name:menu,reminder:'true'
    }).then(function(){showToast(name+' 様にリマインダーを送信しました');})
      .catch(function(){showToast('送信に失敗しました');});
  }
  if(!window.emailjs){
    loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js',function(){
      emailjs.init(EMAILJS_PUBLIC);doSend();
    });
  } else {doSend();}
}

/* ===== TABS ===== */
function showTab(n){
  for(var i=1;i<=6;i++){
    document.getElementById('tab'+i).classList.toggle('active',i===n);
    document.getElementById('tabContent'+i).classList.toggle('active',i===n);
  }
  if(n===5){renderBlockCalendar();renderBlockedList();}
}

/* ===== TOAST ===== */
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
