<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わかば 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #5C8A5C;
    --green-dark: #3A4A2E;
    --green-light: #eef5ec;
    --green-border: #d8e8d4;
    --text: #2D2D2D;
    --muted: #8A8070;
    --bg: #FAF8F4;
    --white: #fff;
    --red: #c0392b;
    --red-light: #fff0ee;
    --red-border: #f5c6c2;
    --today-bg: #5C8A5C;
    --today-fg: #fff;
    --selected-bg: #a8d5b8;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(160deg, #F0EBE1 0%, #E8E2D5 50%, #EDE8DE 100%);
  }

  .login-box {
    background: var(--white);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  .login-logo { font-size: 36px; margin-bottom: 8px; }
  .login-box h2 { font-size: 20px; font-weight: 700; color: var(--green-dark); margin-bottom: 4px; }
  .login-box .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; letter-spacing: 0.05em; }

  .login-box input {
    width: 100%;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 13px 16px;
    font-family: inherit;
    font-size: 15px;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    color: var(--text);
  }

  .login-box input:focus { border-color: var(--green); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #5C8A5C, #7AAE7A);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(92,138,92,0.3);
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(92,138,92,0.4); }
  .login-err { color: #E07070; font-size: 13px; margin-top: 10px; display: none; }

  /* ===== MAIN ===== */
  #mainScreen { display: none; }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--green-border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo { font-size: 16px; font-weight: 400; color: var(--green); letter-spacing: 0.1em; }
  header .sub { font-size: 11px; color: var(--muted); }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--green-border);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--green-border);
    background: var(--white);
    overflow-x: auto;
  }

  .tab {
    flex: 1;
    min-width: 80px;
    padding: 14px 8px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    letter-spacing: 0.06em;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .tab-content { display: none; padding: 20px; max-width: 640px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* ===== SECTION ===== */
  .section-title {
    font-size: 13px;
    font-weight: 400;
    color: var(--green);
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--green-border);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--green-border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  /* ===== 今日の予約バナー ===== */
  #todayBanner {
    background: linear-gradient(135deg, #eef5ec, #d8ead3);
    border: 1px solid var(--green-border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: none;
  }

  #todayBanner h3 { font-size: 13px; color: var(--green); margin-bottom: 10px; letter-spacing: 0.08em; }

  .today-res-item {
    background: var(--white);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .today-time { font-weight: 500; color: var(--green); min-width: 50px; }

  /* ===== 統計カード ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--white);
    border: 1px solid var(--green-border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-num { font-size: 28px; font-weight: 300; color: var(--green); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: 0.06em; }

  .menu-stats { }
  .menu-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0f4ef;
    font-size: 13px;
  }

  .menu-stat-row:last-child { border-bottom: none; }
  .menu-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: #eee; border-radius: 3px; }
  .menu-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s; }

  /* ===== 予約一覧 ===== */
  .res-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--green-border);
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    background: var(--white);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active { background: var(--green); color: var(--white); border-color: var(--green); }

  .reservation-item {
    background: var(--white);
    border: 1px solid var(--green-border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }

  .reservation-item:hover { box-shadow: 0 2px 12px rgba(74,124,89,0.1); }

  .reservation-item.today-highlight {
    border-color: var(--green);
    border-width: 1.5px;
  }

  .res-date { font-size: 13px; font-weight: 500; color: var(--green); margin-bottom: 6px; }
  .res-detail { font-size: 13px; color: var(--text); line-height: 1.8; }

  .res-memo-wrap { margin-top: 8px; }
  .res-memo-input {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    resize: none;
    outline: none;
    background: #fafafa;
    transition: border-color 0.2s;
  }

  .res-memo-input:focus { border-color: var(--green); background: var(--white); }

  .res-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .btn-memo-save {
    padding: 5px 12px;
    background: var(--green-light);
    border: 1px solid var(--green-border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    color: var(--green);
    cursor: pointer;
  }

  .btn-delete {
    padding: 5px 12px;
    background: var(--red-light);
    border: 1px solid var(--red-border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    color: var(--red);
    cursor: pointer;
    margin-left: auto;
  }

  .no-res { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* ===== カレンダー ===== */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-nav button {
    background: none;
    border: 1px solid var(--green-border);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--green);
    cursor: pointer;
  }

  .cal-title { font-size: 15px; font-weight: 400; color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }

  .cal-header { text-align: center; font-size: 11px; color: var(--muted); padding: 6px 0; }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }

  .cal-day:hover { background: var(--green-light); }
  .cal-day.today { background: var(--today-bg); color: var(--today-fg); border-radius: 50%; }
  .cal-day.off { color: #ccc; background: #f5f5f5; cursor: default; }
  .cal-day.off:hover { background: #f5f5f5; }
  .cal-day.selected { background: var(--selected-bg); border-radius: 50%; }
  .cal-dot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--green); border-radius: 50%; }

  /* ===== 休業日設定 ===== */
  .week-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .week-btn {
    width: 44px; height: 44px;
    border: 1px solid var(--green-border);
    border-radius: 50%;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    background: var(--white);
    cursor: pointer;
    transition: all 0.15s;
  }

  .week-btn.active { background: var(--green); color: var(--white); border-color: var(--green); }

  .holiday-list { margin-top: 12px; }
  .holiday-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #fff8f0;
    border: 1px solid #f0dfc0;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .holiday-del {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }

  /* ===== 営業時間設定 ===== */
  .hours-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hours-table th, .hours-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #f0f4ef;
    text-align: center;
  }

  .hours-table th { color: var(--muted); font-weight: 400; }
  .hours-table input[type="time"] {
    border: 1px solid var(--green-border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 13px;
    width: 90px;
    text-align: center;
  }


  /* ===== 保存ボタン ===== */
  .save-btn {
    width: 100%;
    background: var(--green);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .save-btn:hover { background: #3d6b4a; }
  .save-btn:disabled { background: #aaa; cursor: default; }

  /* ===== トースト ===== */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(40,80,50,0.92);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    letter-spacing: 0.06em;
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== リマインダー ===== */
  .reminder-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #f0f4ef;
    font-size: 13px;
  }
  .reminder-item:last-child { border-bottom: none; }
  .reminder-info { flex: 1; }
  .reminder-name { font-weight: 400; color: var(--text); }
  .reminder-time { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .btn-send {
    padding: 7px 14px;
    background: var(--green);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-send:hover { background: #3d6b4a; }
  .btn-send:disabled { background: #aaa; cursor: default; }

  /* ===== 時間ブロック ===== */
  .block-slot-btn {
    padding: 8px 14px;
    border: 1px solid var(--green-border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    background: var(--white);
    cursor: pointer;
    transition: all 0.2s;
  }

  .block-slot-btn.blocked {
    background: var(--red-light);
    border-color: var(--red-border);
    color: var(--red);
  }

  .blocked-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red-light);
    border: 1px solid var(--red-border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--red);
    margin: 4px;
  }

  .blocked-tag button {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
  }

  .no-block { font-size: 13px; color: var(--muted); padding: 8px 0; }

  /* ===== モーダル（削除確認）===== */
  #deleteModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #deleteModal.open { display: flex; }

  .modal-box {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .modal-box h3 { font-size: 16px; font-weight: 400; color: var(--text); margin-bottom: 8px; }
  .modal-box p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

  .modal-btns { display: flex; gap: 12px; }
  .btn-modal-cancel {
    flex: 1;
    padding: 12px;
    background: var(--white);
    border: 1px solid var(--green-border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
  }

  .btn-modal-delete {
    flex: 1;
    padding: 12px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: var(--white);
    cursor: pointer;
  }
</style>
</head>

<script>
  const PASSWORD = 'wakaba2026';
  const EMAILJS_PUBLIC = 'Zx76IaljM4koG9057';

  let weeklyOff = [0];
  let specificOff = [];
  let hoursConfig = {
    0:{open:'10:00',close:'18:00'},1:{open:'18:30',close:'21:30'},
    2:{open:'18:30',close:'21:30'},3:{open:'18:30',close:'21:30'},
    4:{open:'18:30',close:'21:30'},5:{open:'18:30',close:'21:30'},
    6:{open:'10:00',close:'18:00'}
  };
  let allReservations = [];
  let blockedSlots = [];
  let selectedBlockDate = null;
  let blockCalYear, blockCalMonth;
  let currentFilter = 'all';
  let deleteTargetId = null;
  let calYear, calMonth;
  const today = new Date();
  let todayStr;

  // ===== LOGIN =====
  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      initMain();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
  }

  // ===== FIREBASE =====
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  async function initFirebase() {
    if (window._db) return window._db;
    await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js");
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:"AIzaSyDwOnp5ZsFAPtiaVgipEXQwUO3HlCZuRLU",
        authDomain:"wakaba-m.firebaseapp.com",
        projectId:"wakaba-m",
        storageBucket:"wakaba-m.firebasestorage.app",
        messagingSenderId:"904844527203",
        appId:"1:904844527203:web:a027a87a449f5b436bda56"
      });
    }
    const db = firebase.firestore();
    window._db = db;
    window._fb = {
      doc: (db, col, id) => db.collection(col).doc(id),
      getDoc: async (ref) => { const s = await ref.get(); return { exists: () => s.exists, data: () => s.data() }; },
      setDoc: (ref, data) => ref.set(data),
      updateDoc: (ref, data) => ref.update(data),
      deleteDoc: (ref) => ref.delete(),
      collection: (db, name) => db.collection(name),
      getDocs: async (ref) => { const s = await ref.get(); return { forEach: (fn) => s.docs.forEach(d => fn({ id: d.id, data: () => d.data() })) }; },
    };
    return db;
  }

  async function initMain() {
    calYear = today.getFullYear();
    calMonth = today.getMonth();
    await loadSettings();
    renderWeekBtns();
    renderHoursTable();
    renderCalendar();
    renderHolidayList();
    blockCalYear = today.getFullYear();
    blockCalMonth = today.getMonth();
    renderBlockCalendar();
    renderBlockedList();
    await loadReservations();
  }

  async function loadSettings() {
    try {
      const db = await initFirebase();
      const snap = await db.collection('settings').doc('business').get();
      const snapWrap = { exists: () => snap.exists, data: () => snap.data() };
      if (snapWrap.exists()) {
        const d = snapWrap.data();
        weeklyOff = d.weeklyOff || [];
        specificOff = d.specificOff || [];
        if (d.hoursConfig) hoursConfig = d.hoursConfig;
        if (d.blockedSlots) blockedSlots = d.blockedSlots;
      }
    } catch(e) { console.warn(e); }
  }

  async function saveSettings() {
    const btn = document.getElementById('saveBtn');
    if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
    try {
      const db = await initFirebase();
      await db.collection('settings').doc('business').set({ weeklyOff, specificOff, hoursConfig, blockedSlots, updatedAt: new Date().toISOString() });
      showToast('設定を保存しました');
    } catch(e) {
      showToast('保存に失敗しました');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '設定を保存する'; }
    }
  }

  // ===== 予約読み込み =====
  async function loadReservations() {
    try {
      const db = await initFirebase();
      const snap = await db.collection('reservations').get();
      allReservations = [];
      snap.forEach(d => allReservations.push({ id: d.id, ...d.data() }));
      allReservations.sort((a,b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return a.time.localeCompare(b.time);
      });
      renderReservations();
      renderTodayBanner();
      renderStats();
      renderReminderList();
    } catch(e) {
      document.getElementById('reservationList').innerHTML = '<div class="no-res">読み込みに失敗しました</div>';
    }
  }

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  todayStr = fmtDate(today);

  function getWeekRange() {
    const d = new Date(today);
    const day = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate() - day + (day===0?-6:1));
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return [fmtDate(mon), fmtDate(sun)];
  }

  function filterItems(items, filter) {
    const future = items.filter(r => r.date >= todayStr);
    if (filter === 'today') return future.filter(r => r.date === todayStr);
    if (filter === 'week') {
      const [mon, sun] = getWeekRange();
      return future.filter(r => r.date >= mon && r.date <= sun);
    }
    if (filter === 'month') {
      const prefix = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
      return future.filter(r => r.date.startsWith(prefix));
    }
    return future;
  }

  function filterRes(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReservations();
  }

  function renderReservations() {
    const list = document.getElementById('reservationList');
    const items = filterItems(allReservations, currentFilter);
    if (items.length === 0) {
      list.innerHTML = '<div class="no-res">該当する予約はありません</div>';
      return;
    }
    list.innerHTML = items.map(r => {
      const d = new Date(r.date);
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      const isToday = r.date === todayStr;
      const memo = r.memo || '';
      return `<div class="reservation-item${isToday ? ' today-highlight' : ''}" id="res-${r.id}">
        <div class="res-date">${isToday ? '🟢 ' : ''}${d.getMonth()+1}/${d.getDate()}（${dow}） ${r.time}〜</div>
        <div class="res-detail">
          ${r.name} 様　／　${r.menuName}　／　${r.tel}<br>
          ${r.email ? r.email : ''}
        </div>
        <div class="res-memo-wrap">
          <textarea class="res-memo-input" id="memo-${r.id}" rows="1" placeholder="メモを追加...">${memo}</textarea>
          <div class="res-actions">
            <button class="btn-memo-save" onclick="saveMemo('${r.id}')">メモ保存</button>
            <button class="btn-delete" onclick="openDeleteModal('${r.id}','${r.name}','${d.getMonth()+1}/${d.getDate()} ${r.time}')">削除</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ===== 今日のバナー =====
  function renderTodayBanner() {
    const banner = document.getElementById('todayBanner');
    const list = document.getElementById('todayList');
    const todayItems = allReservations.filter(r => r.date === todayStr);
    if (todayItems.length === 0) { banner.style.display = 'none'; return; }
    banner.style.display = 'block';
    list.innerHTML = todayItems.map(r =>
      `<div class="today-res-item">
        <span class="today-time">${r.time}</span>
        <span>${r.name} 様　${r.menuName}</span>
      </div>`
    ).join('');
  }

  // ===== 統計 =====
  function renderStats() {
    const monthPrefix = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const [mon, sun] = getWeekRange();
    document.getElementById('statTotal').textContent = allReservations.length;
    document.getElementById('statMonth').textContent = allReservations.filter(r => r.date.startsWith(monthPrefix)).length;
    document.getElementById('statWeek').textContent = allReservations.filter(r => r.date >= mon && r.date <= sun).length;
    document.getElementById('statToday').textContent = allReservations.filter(r => r.date === todayStr).length;

    // メニュー別
    const monthItems = allReservations.filter(r => r.date.startsWith(monthPrefix));
    const menuCount = {};
    monthItems.forEach(r => { menuCount[r.menuName] = (menuCount[r.menuName]||0)+1; });
    const max = Math.max(...Object.values(menuCount), 1);
    const menuStatsEl = document.getElementById('menuStats');
    if (Object.keys(menuCount).length === 0) {
      menuStatsEl.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:12px 0;">今月の予約はありません</div>';
    } else {
      menuStatsEl.innerHTML = Object.entries(menuCount).sort((a,b)=>b[1]-a[1]).map(([name,cnt]) =>
        `<div class="menu-stat-row">
          <span>${name}</span>
          <div class="menu-bar-wrap"><div class="menu-bar" style="width:${Math.round(cnt/max*100)}%"></div></div>
          <span style="min-width:24px;text-align:right;font-size:13px;color:var(--green)">${cnt}</span>
        </div>`
      ).join('');
    }
  }

  // ===== メモ保存 =====
  async function saveMemo(id) {
    const memo = document.getElementById(`memo-${id}`).value;
    try {
      const db = await initFirebase();
      await db.collection('reservations').doc(id).update({ memo });
      const target = allReservations.find(r => r.id === id);
      if (target) target.memo = memo;
      showToast('メモを保存しました');
    } catch(e) { showToast('保存に失敗しました'); }
  }

  // ===== 削除モーダル =====
  function openDeleteModal(id, name, datetime) {
    deleteTargetId = id;
    document.getElementById('deleteModalInfo').textContent = `${datetime}　${name} 様の予約を削除します。この操作は元に戻せません。`;
    document.getElementById('deleteModal').classList.add('open');
  }

  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    deleteTargetId = null;
  }

  async function confirmDelete() {
    if (!deleteTargetId) return;
    try {
      const db = await initFirebase();
      await db.collection('reservations').doc(deleteTargetId).delete();
      allReservations = allReservations.filter(r => r.id !== deleteTargetId);
      closeDeleteModal();
      renderReservations();
      renderTodayBanner();
      renderStats();
        showToast('予約を削除しました');
    } catch(e) { showToast('削除に失敗しました'); closeDeleteModal(); }
  }

    // EmailJS送信
    if (!window.emailjs) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
      document.head.appendChild(s);
      await new Promise(r => s.onload = r);
      emailjs.init(EMAILJS_PUBLIC);
    }
    const d = new Date(date);
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TPL_CUSTOMER, {
        to_name: name,
        to_email: email,
        date: `${d.getMonth()+1}/${d.getDate()}（${dow}）`,
        time,
        menu_name: menu,
        reminder: 'true'
      });
      showToast(`${name} 様にリマインダーを送信しました`);
    } catch(e) { showToast('送信に失敗しました'); }
  }

  // ===== 休業日・カレンダー =====
  function renderWeekBtns() {
    const wrap = document.getElementById('weekBtns');
    const days = ['日','月','火','水','木','金','土'];
    wrap.innerHTML = days.map((d,i) =>
      `<button class="week-btn${weeklyOff.includes(i)?' active':''}" onclick="toggleWeekOff(${i},this)">${d}</button>`
    ).join('');
  }

  function toggleWeekOff(i, btn) {
    if (weeklyOff.includes(i)) weeklyOff = weeklyOff.filter(d=>d!==i);
    else weeklyOff.push(i);
    btn.classList.toggle('active');
  }

  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${calYear}年 ${calMonth+1}月`;
    const grid = document.getElementById('calGrid');
    const days = ['日','月','火','水','木','金','土'];
    let html = days.map(d=>`<div class="cal-header">${d}</div>`).join('');
    const first = new Date(calYear, calMonth, 1).getDay();
    for (let i=0;i<first;i++) html += '<div></div>';
    const last = new Date(calYear, calMonth+1, 0).getDate();
    for (let d=1;d<=last;d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = new Date(calYear, calMonth, d).getDay();
      const isOff = weeklyOff.includes(dow) || specificOff.includes(dateStr);
      const isToday = dateStr === todayStr;
      const isSel = specificOff.includes(dateStr);
      html += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${isOff&&!isToday?' off':''}" onclick="toggleSpecificOff('${dateStr}',this)">${d}</div>`;
    }
    grid.innerHTML = html;
  }

  function toggleSpecificOff(dateStr, el) {
    if (specificOff.includes(dateStr)) {
      specificOff = specificOff.filter(d=>d!==dateStr);
      el.classList.remove('selected');
    } else {
      specificOff.push(dateStr);
      el.classList.add('selected');
    }
    renderHolidayList();
  }

  function renderHolidayList() {
    const list = document.getElementById('holidayList');
    const sorted = [...specificOff].sort();
    if (sorted.length===0) {
      list.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:8px 0;">特定休業日はありません</div>';
      return;
    }
    list.innerHTML = sorted.map(d => {
      const dt = new Date(d);
      const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
      return `<div class="holiday-item">
        <span>${dt.getMonth()+1}/${dt.getDate()}（${dow}）</span>
        <button class="holiday-del" onclick="removeSpecificOff('${d}')">×</button>
      </div>`;
    }).join('');
  }

  function removeSpecificOff(d) {
    specificOff = specificOff.filter(x=>x!==d);
    renderCalendar();
    renderHolidayList();
  }

  function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
  function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

  // ===== 営業時間 =====
  function renderHoursTable() {
    const days = ['日','月','火','水','木','金','土'];
    const tbody = document.getElementById('hoursTbody');
    tbody.innerHTML = days.map((d,i) => {
      const cfg = hoursConfig[i] || {open:'10:00',close:'18:00'};
      return `<tr>
        <td>${d}</td>
        <td><input type="time" id="open-${i}" value="${cfg.open}" onchange="updateHours(${i})"></td>
        <td><input type="time" id="close-${i}" value="${cfg.close}" onchange="updateHours(${i})"></td>
      </tr>`;
    }).join('');
  }

  function updateHours(i) {
    const open = document.getElementById(`open-${i}`).value;
    const close = document.getElementById(`close-${i}`).value;
    if (!hoursConfig[i]) hoursConfig[i] = {};
    hoursConfig[i].open = open;
    hoursConfig[i].close = close;
  }

  // ===== TABS =====
  function showTab(n) {
    if(n===5){renderBlockCalendar();renderBlockedList();}
    for(let i=1;i<=6;i++){
      document.getElementById(`tab${i}`).classList.toggle('active', i===n);
      document.getElementById(`tabContent${i}`).classList.toggle('active', i===n);
    }
  }

  // ===== リマインダー =====
  function renderReminderList() {
    const el = document.getElementById('reminderList');
    if (!el) return;
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate()+1);
    const tomorrowStr = fmtDate(tomorrow);
    const items = allReservations.filter(r => r.date === tomorrowStr);
    if (items.length === 0) {
      el.innerHTML = '<div class="no-res">明日の予約はありません</div>';
      return;
    }
    const dow = ['日','月','火','水','木','金','土'][tomorrow.getDay()];
    el.innerHTML = items.map(r =>
      `<div class="reminder-item">
        <div class="reminder-info">
          <div class="reminder-name">${r.name} 様</div>
          <div class="reminder-time">${tomorrow.getMonth()+1}/${tomorrow.getDate()}（${dow}） ${r.time}〜　${r.menuName}</div>
        </div>
        <button class="btn-send" onclick="sendReminder('${r.id}','${r.name}','${r.email||''}','${r.date}','${r.time}','${r.menuName}')">送信</button>
      </div>`
    ).join('');
  }

  async function sendReminder(id, name, email, date, time, menu) {
    if (!email) { showToast('メールアドレスがありません'); return; }
    if (!window.emailjs) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
      document.head.appendChild(s);
      await new Promise(r => s.onload = r);
      emailjs.init(EMAILJS_PUBLIC);
    }
    const d = new Date(date);
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TPL_CUSTOMER, {
        to_name: name,
        to_email: email,
        date: `${d.getMonth()+1}/${d.getDate()}（${dow}）`,
        time,
        menu_name: menu,
        reminder: 'true'
      });
      showToast(`${name} 様にリマインダーを送信しました`);
    } catch(e) { showToast('送信に失敗しました'); }
  }

  // ===== 時間ブロック =====
  function renderBlockCalendar() {
    if (!blockCalYear) { blockCalYear = today.getFullYear(); blockCalMonth = today.getMonth(); }
    document.getElementById('blockCalTitle').textContent = `${blockCalYear}年 ${blockCalMonth+1}月`;
    const grid = document.getElementById('blockCalGrid');
    const days = ['日','月','火','水','木','金','土'];
    let html = days.map(d=>`<div class="cal-header">${d}</div>`).join('');
    const first = new Date(blockCalYear, blockCalMonth, 1).getDay();
    for(let i=0;i<first;i++) html += '<div></div>';
    const last = new Date(blockCalYear, blockCalMonth+1, 0).getDate();
    for(let d=1;d<=last;d++){
      const dateStr = `${blockCalYear}-${String(blockCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = new Date(blockCalYear, blockCalMonth, d).getDay();
      const isToday = dateStr === todayStr;
      const isSel = selectedBlockDate === dateStr;
      const isOff = weeklyOff.includes(dow) || specificOff.includes(dateStr);
      html += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${isOff&&!isToday?' off':''}" onclick="selectBlockDate('${dateStr}',${dow})">${d}</div>`;
    }
    grid.innerHTML = html;
  }

  function selectBlockDate(dateStr, dow) {
    selectedBlockDate = dateStr;
    renderBlockCalendar();
    const d = new Date(dateStr);
    const dowNames = ['日','月','火','水','木','金','土'];
    document.getElementById('blockDateLabel').textContent = `${d.getMonth()+1}/${d.getDate()}（${dowNames[dow]}）の時間ブロック`;
    const cfg = hoursConfig[dow] || hoursConfig[String(dow)];
    let times = dow === 0 || dow === 6
      ? ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00']
      : ['18:30','19:30','20:30','21:30'];
    if (cfg && cfg.slots) times = cfg.slots;
    else if (cfg && cfg.open && cfg.close) times = generateTimeSlots(cfg.open, cfg.close);
    document.getElementById('blockSlots').innerHTML = times.map(t => {
      const key = `${dateStr}_${t.replace(':','')}`;
      const isBlocked = blockedSlots.includes(key);
      return `<button class="block-slot-btn${isBlocked?' blocked':''}" data-key="${key}" onclick="toggleBlockSlot(this)">${t}　${isBlocked?'🔒 ブロック中':'○ 空き'}</button>`;
    }).join('');
    document.getElementById('blockTimeSection').style.display = 'block';
  }

  function generateTimeSlots(open, close) {
    const slots = [];
    let [h,m] = open.split(':').map(Number);
    const [eh,em] = close.split(':').map(Number);
    while(h < eh || (h===eh && m<=em)) {
      slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
      m += 60; if(m>=60){h++;m-=60;}
    }
    return slots;
  }

  function toggleBlockSlot(el) {
    const key = el.dataset.key;
    const t = key.split('_')[1];
    const timeStr = t.slice(0,2)+':'+t.slice(2);
    if(blockedSlots.includes(key)){
      blockedSlots = blockedSlots.filter(k=>k!==key);
      el.classList.remove('blocked');
      el.textContent = `${timeStr}　○ 空き`;
    } else {
      blockedSlots.push(key);
      el.classList.add('blocked');
      el.textContent = `${timeStr}　🔒 ブロック中`;
    }
    renderBlockedList();
  }

  function renderBlockedList() {
    const list = document.getElementById('blockedList');
    if (!list) return;
    if(!blockedSlots.length){ list.innerHTML='<div class="no-block">ブロック中の時間帯はありません</div>'; return; }
    list.innerHTML = [...blockedSlots].sort().map(key => {
      const [dateStr,timeRaw] = key.split('_');
      const timeStr = timeRaw.slice(0,2)+':'+timeRaw.slice(2);
      const d = new Date(dateStr);
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      return `<span class="blocked-tag">${d.getMonth()+1}/${d.getDate()}（${dow}） ${timeStr}<button onclick="removeBlock('${key}')">×</button></span>`;
    }).join('');
  }

  function removeBlock(key) {
    blockedSlots = blockedSlots.filter(k=>k!==key);
    renderBlockedList();
    if(selectedBlockDate && key.startsWith(selectedBlockDate)) {
      selectBlockDate(selectedBlockDate, new Date(selectedBlockDate).getDay());
    }
  }

  function prevBlockMonth() { blockCalMonth--; if(blockCalMonth<0){blockCalMonth=11;blockCalYear--;} renderBlockCalendar(); }
  function nextBlockMonth() { blockCalMonth++; if(blockCalMonth>11){blockCalMonth=0;blockCalYear++;} renderBlockCalendar(); }

  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }
</script>
</body>
