<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約キャンセル | わかば</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif JP', serif;
      background: #f8faf7;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #d8e8d4;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 18px;
      font-weight: 500;
      color: #333;
      letter-spacing: 0.05em;
    }

    header .sub {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 40px 20px 60px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 36px;
    }

    .page-title h1 {
      font-size: 20px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .page-title p {
      font-size: 13px;
      color: #888;
      line-height: 1.8;
    }

    /* --- ローディング画面 --- */
    .loading-card {
      background: #fff;
      border: 1px solid #d8e8d4;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #d8e8d4;
      border-top-color: #4a7c59;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- 予約情報カード --- */
    .reservation-card {
      background: #fff;
      border: 1px solid #d8e8d4;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }

    .card-header {
      background: #eef5ec;
      padding: 20px 24px;
      border-bottom: 1px solid #d8e8d4;
    }

    .card-header h2 {
      font-size: 15px;
      font-weight: 400;
      color: #4a7c59;
      letter-spacing: 0.08em;
    }

    .card-body {
      padding: 24px;
    }

    .info-row {
      display: flex;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4ef;
      font-size: 14px;
      line-height: 1.6;
    }

    .info-row:last-child { border-bottom: none; }

    .info-label {
      width: 100px;
      flex-shrink: 0;
      color: #888;
      font-size: 13px;
    }

    .info-value {
      color: #333;
      font-weight: 400;
    }

    /* --- 注意書き --- */
    .notice {
      background: #fff8f0;
      border: 1px solid #f0dfc0;
      border-radius: 8px;
      padding: 14px 18px;
      margin: 20px 24px;
      font-size: 13px;
      color: #8a6030;
      line-height: 1.8;
    }

    .notice::before {
      content: "ご注意　";
      font-weight: 500;
    }

    /* --- キャンセルボタン --- */
    .btn-area {
      padding: 8px 24px 28px;
    }

    .btn-cancel {
      width: 100%;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-cancel:hover { background: #a93226; }
    .btn-cancel:active { transform: scale(0.98); }
    .btn-cancel:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-back {
      width: 100%;
      background: transparent;
      color: #4a7c59;
      border: 1px solid #4a7c59;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    .btn-back:hover { background: #eef5ec; }

    /* --- 完了画面 --- */
    .done-card {
      background: #fff;
      border: 1px solid #d8e8d4;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      display: none;
    }

    .done-icon {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .done-card h2 {
      font-size: 18px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .done-card p {
      font-size: 14px;
      color: #777;
      line-height: 1.9;
    }

    /* --- エラー画面 --- */
    .error-card {
      background: #fff;
      border: 1px solid #f0c0c0;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      display: none;
    }

    .error-card h2 {
      font-size: 17px;
      font-weight: 400;
      color: #c0392b;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .error-card p {
      font-size: 14px;
      color: #777;
      line-height: 1.9;
    }
  </style>
</head>
<body>

<header>
  <div class="sub">Wakaba | 佐世保市</div>
</header>

<div class="container">
  <div class="page-title">
    <h1>ご予約のキャンセル</h1>
    <p>内容をご確認のうえ、キャンセルをお手続きください。</p>
  </div>

  <!-- ローディング -->
  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <p style="font-size:14px;color:#888;">予約情報を確認中...</p>
  </div>

  <!-- 予約情報カード -->
  <div class="reservation-card" id="reservationCard">
    <div class="card-header">
      <h2>ご予約内容</h2>
    </div>
    <div class="card-body">
      <div class="info-row">
        <span class="info-label">お名前</span>
        <span class="info-value" id="infoName">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">メニュー</span>
        <span class="info-value" id="infoMenu">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">日時</span>
        <span class="info-value" id="infoDatetime">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">担当</span>
        <span class="info-value" id="infoStaff">—</span>
      </div>
    </div>

    <div class="notice">
      キャンセルされますと元に戻すことができません。なるべくお早めにお手続きください。
    </div>

    <div class="btn-area">
      <button class="btn-cancel" id="btnCancel" onclick="doCancel()">この予約をキャンセルする</button>
      <button class="btn-back" onclick="history.back()">戻る</button>
    </div>
  </div>

  <!-- 完了カード -->
  <div class="done-card" id="doneCard">
    <div class="done-icon">✓</div>
    <h2>キャンセルが完了しました</h2>
    <p>
      ご予約のキャンセルを承りました。<br>
      またのご来院をお待ちしております。<br><br>
      キャンセル完了メールをお送りしておりますので<br>
      ご確認ください。
    </p>
  </div>

  <!-- エラーカード -->
  <div class="error-card" id="errorCard">
    <h2>予約が見つかりません</h2>
    <p id="errorMsg">
      URLが正しいかご確認ください。<br>
      すでにキャンセル済みの場合もあります。
    </p>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDwOnp5ZsFAPtiaVgipEXQwUO3HlCZuRLU",
    authDomain: "wakaba-m.firebaseapp.com",
    projectId: "wakaba-m",
    storageBucket: "wakaba-m.firebasestorage.app",
    messagingSenderId: "904844527203",
    appId: "1:904844527203:web:a027a87a449f5b436bda56"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // URLパラメータから予約IDを取得
  const params = new URLSearchParams(location.search);
  const reservationId = params.get("id");

  window._reservationData = null;
  window._reservationId   = reservationId;
  window._db = db;
  window._doc = doc;
  window._deleteDoc = deleteDoc;

  async function loadReservation() {
    if (!reservationId) {
      showError("予約IDが指定されていません。");
      return;
    }

    try {
      const snapshot = await getDoc(doc(db, "reservations", reservationId));
      if (!snapshot.exists()) {
        showError("ご予約が見つかりませんでした。<br>すでにキャンセル済みの場合もあります。");
        return;
      }

      const data = snapshot.data();
      window._reservationData = data;

      // 表示
      document.getElementById("infoName").textContent     = data.name     || "—";
      document.getElementById("infoMenu").textContent     = data.menuName || data.menu || "—";
      document.getElementById("infoDatetime").textContent = (data.date || "") + " " + (data.time || "") + "〜";
      document.getElementById("infoStaff").textContent    = data.staff    || "指名なし";

      hide("loadingCard");
      show("reservationCard");

    } catch (e) {
      showError("予約情報の取得に失敗しました。<br>しばらく経ってから再度お試しください。");
    }
  }

  function show(id) { document.getElementById(id).style.display = "block"; }
  function hide(id) { document.getElementById(id).style.display = "none"; }

  function showError(msg) {
    hide("loadingCard");
    document.getElementById("errorMsg").innerHTML = msg;
    show("errorCard");
  }

  window.doCancel = async function() {
    const btn = document.getElementById("btnCancel");
    btn.disabled = true;
    btn.textContent = "処理中...";

    try {
      // 1. Firestore から削除
      await deleteDoc(doc(window._db, "reservations", window._reservationId));

      // 2. EmailJS でキャンセル完了メール送信
      const d = window._reservationData;
      if (d && d.email) {
        await sendCancelEmail(d);
      }

      // 3. 完了画面へ
      hide("reservationCard");
      show("doneCard");

    } catch (e) {
      btn.disabled = false;
      btn.textContent = "この予約をキャンセルする";
      alert("キャンセルに失敗しました。\nしばらく経ってから再度お試しください。");
    }
  };

  loadReservation();
</script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("Zx76IaljM4koG9057");

  async function sendCancelEmail(data) {
    // template_aefya05 の変数名に合わせる
    const params = {
      customer_name: data.name || "お客様",
      customer_email: data.email,
      email_to: data.email,
      menu_name: data.menuName || data.menu || "—",
      日付: data.date || "—",
      時刻: (data.time || "—") + "〜",
      staff: data.staff || "指名なし",
      cancel_url: "",
      subject: "【wakaba】ご予約のキャンセルを承りました",
    };

    // ※ template_cancel は新規作成が必要（手順は下記参照）
    await emailjs.send("service_frn3vnw", "template_aefya05", params);
  }
</script>

</body>
</html>
